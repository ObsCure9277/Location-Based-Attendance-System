[build]
  publish = "build/web"
  command = "curl -O https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.10.6-stable.tar.xz && tar xf flutter_linux_3.10.6-stable.tar.xz && export PATH=\"$PATH:$PWD/flutter/bin\" && flutter doctor && flutter config --enable-web && flutter pub get && flutter build web --release"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200